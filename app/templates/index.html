<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinical Calculator — AI-Powered</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3347;
    --accent: #4f8ef7;
    --accent-hover: #6ba3ff;
    --text: #e8eaf0;
    --text-muted: #8b90a8;
    --low: #34c48b;
    --moderate: #f0a830;
    --high: #e05454;
    --very-high: #c0392b;
    --radius: 10px;
    --font: 'Inter', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex; align-items: center; gap: 12px;
  }
  header svg { flex-shrink: 0; }
  header h1 { font-size: 1.15rem; font-weight: 600; }
  header span { font-size: .85rem; color: var(--text-muted); margin-left: 4px; }

  main { max-width: 900px; margin: 0 auto; padding: 32px 20px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
  }

  label { display: block; font-size: .85rem; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: .95rem;
    line-height: 1.6;
    padding: 14px;
    resize: vertical;
    min-height: 160px;
    outline: none;
    transition: border-color .15s;
  }
  textarea:focus { border-color: var(--accent); }

  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .example-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: .78rem;
    padding: 5px 10px;
    transition: color .15s, border-color .15s;
  }
  .example-btn:hover { color: var(--accent); border-color: var(--accent); }

  .btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: .95rem;
    font-weight: 600;
    padding: 12px 28px;
    margin-top: 16px;
    transition: background .15s, opacity .15s;
    display: flex; align-items: center; gap: 8px;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error {
    background: rgba(224,84,84,.15);
    border: 1px solid rgba(224,84,84,.4);
    border-radius: 8px;
    color: #ff8080;
    padding: 12px 16px;
    font-size: .9rem;
    margin-top: 16px;
    display: none;
  }

  /* Results */
  #results { display: none; }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .result-header {
    padding: 16px 20px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  .result-name { font-weight: 600; font-size: 1rem; flex: 1; }
  .score-badge {
    font-size: 1.4rem; font-weight: 700;
    padding: 4px 14px;
    border-radius: 20px;
  }
  .risk-badge {
    font-size: .75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .06em;
    padding: 4px 10px; border-radius: 20px;
  }
  .low    { background: rgba(52,196,139,.15); color: var(--low); }
  .moderate { background: rgba(240,168,48,.15); color: var(--moderate); }
  .high   { background: rgba(224,84,84,.15); color: var(--high); }
  .very_high { background: rgba(192,57,43,.25); color: #ff6b6b; }

  .result-body { padding: 16px 20px; }
  .result-body p { font-size: .9rem; line-height: 1.6; color: var(--text-muted); margin-bottom: 8px; }
  .result-body strong { color: var(--text); }

  .recommendation {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
    padding: 10px 14px;
    font-size: .88rem;
    line-height: 1.6;
    margin: 10px 0;
  }

  .breakdown { margin-top: 12px; }
  .breakdown summary {
    cursor: pointer; font-size: .82rem; color: var(--text-muted);
    user-select: none; margin-bottom: 8px;
  }
  .breakdown summary:hover { color: var(--text); }
  .bd-table { width: 100%; border-collapse: collapse; font-size: .82rem; margin-top: 8px; }
  .bd-table td { padding: 5px 8px; border-bottom: 1px solid var(--border); }
  .bd-table td:first-child { color: var(--text-muted); }
  .bd-table td:last-child { text-align: right; font-weight: 600; }
  .bd-table tr:last-child td { border-bottom: none; }

  .reasoning-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
  }
  .reasoning-card h3 { font-size: .9rem; color: var(--text-muted); margin-bottom: 10px; }
  .reasoning-card p { font-size: .9rem; line-height: 1.7; white-space: pre-wrap; }

  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: .95rem;
  }
</style>
</head>
<body>

<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="28" height="28" rx="8" fill="#4f8ef7" fill-opacity="0.15"/>
    <path d="M14 6v16M6 14h16" stroke="#4f8ef7" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="14" cy="14" r="4" stroke="#4f8ef7" stroke-width="1.5"/>
  </svg>
  <h1>Clinical Calculator <span>AI Tool-Use System</span></h1>
</header>

<main>
  <div class="card">
    <label for="note">Clinical Note or Patient History</label>
    <textarea id="note" placeholder="Paste a free-text clinical note, presenting complaint, or patient history…"></textarea>

    <div class="examples">
      <span style="font-size:.78rem;color:var(--text-muted);align-self:center;">Examples:</span>
      <button class="example-btn" onclick="setExample('pe')">Suspected PE</button>
      <button class="example-btn" onclick="setExample('dvt')">Leg swelling / DVT</button>
      <button class="example-btn" onclick="setExample('chest')">Chest pain / ACS</button>
      <button class="example-btn" onclick="setExample('pneu')">Pneumonia</button>
      <button class="example-btn" onclick="setExample('af')">Atrial fibrillation</button>
      <button class="example-btn" onclick="setExample('trauma')">Head trauma / GCS</button>
    </div>

    <button class="btn" id="analyseBtn" onclick="analyse()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.44-4.04Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.44-4.04Z"/></svg>
      Analyse with AI
      <span class="spinner" id="spinner"></span>
    </button>

    <div class="error" id="error"></div>
  </div>

  <div id="results"></div>
</main>

<script>
const EXAMPLES = {
  pe: `72-year-old female presenting with sudden-onset dyspnoea and pleuritic right-sided chest pain for 6 hours. She returned from a 14-hour flight from Australia 5 days ago. Heart rate 118 bpm, SpO2 88% on air. She has a history of breast cancer treated 4 months ago. No leg swelling or tenderness. CXR unremarkable. PE is the leading diagnosis.`,

  dvt: `45-year-old male with a 4-day history of painful left leg swelling. Calf is 4 cm larger than the right side with pitting oedema and tenderness over the deep venous system. He had knee replacement surgery 8 weeks ago and was bedridden for 5 days post-operatively. No alternative diagnosis seems more likely. No previous DVT.`,

  chest: `58-year-old male with 90-minute history of central crushing chest pain radiating to the left arm. He is a known hypertensive, type 2 diabetic, ex-smoker with a family history of ischaemic heart disease. HR 95, BP 145/90. ECG shows 2 mm ST elevation in leads II, III, aVF. Initial troponin 8× upper limit of normal.`,

  pneu: `81-year-old female admitted with 3-day history of productive cough, fever, and increasing confusion. She is a nursing home resident. On examination: temperature 38.9°C, HR 105, RR 32/min, BP 88/55 mmHg. Blood results: urea 9 mmol/L. CXR shows right lower lobe consolidation.`,

  af: `69-year-old male with known persistent atrial fibrillation presenting for anticoagulation review. Past medical history: type 2 diabetes, hypertension, previous TIA 2 years ago, peripheral artery disease. Current medications: metformin, amlodipine, aspirin.`,

  trauma: `23-year-old male brought in by ambulance after high-speed road traffic collision. GCS on arrival: opens eyes only to pain (E2), makes incomprehensible sounds (V2), extends upper limbs to pain (M2). CT head pending.`,
};

function setExample(key) {
  document.getElementById('note').value = EXAMPLES[key];
}

async function analyse() {
  const note = document.getElementById('note').value.trim();
  if (!note) return;

  const btn = document.getElementById('analyseBtn');
  const spinner = document.getElementById('spinner');
  const errorEl = document.getElementById('error');
  const resultsEl = document.getElementById('results');

  btn.disabled = true;
  btn.classList.add('loading');
  spinner.style.display = 'block';
  errorEl.style.display = 'none';
  resultsEl.style.display = 'none';
  resultsEl.innerHTML = '';

  try {
    const res = await fetch('/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ clinical_note: note }),
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: res.statusText }));
      throw new Error(err.detail || 'Request failed');
    }

    const data = await res.json();
    renderResults(data);
  } catch (e) {
    errorEl.textContent = '⚠ ' + e.message;
    errorEl.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
    spinner.style.display = 'none';
  }
}

function riskClass(r) {
  return r === 'very_high' ? 'very_high' : r;
}

function renderResults(data) {
  const el = document.getElementById('results');
  el.innerHTML = '';
  el.style.display = 'block';

  if (!data.calculator_results || data.calculator_results.length === 0) {
    el.innerHTML = `<div class="no-results">
      <p>No calculators were applied. The note may lack sufficient clinical detail.</p>
      ${data.reasoning ? `<p style="margin-top:12px;font-size:.85rem">${escHtml(data.reasoning)}</p>` : ''}
    </div>`;
    return;
  }

  // Reasoning
  if (data.reasoning) {
    const rc = document.createElement('div');
    rc.className = 'reasoning-card';
    rc.innerHTML = `<h3>🤖 AI Reasoning</h3><p>${escHtml(data.reasoning)}</p>`;
    el.appendChild(rc);
  }

  // Calculator results
  for (const r of data.calculator_results) {
    const rc = riskClass(r.risk_level);
    const card = document.createElement('div');
    card.className = 'result-card';

    // Build breakdown rows
    let bdRows = '';
    for (const [k, v] of Object.entries(r.breakdown)) {
      const display = typeof v === 'boolean' ? (v ? '✓ Yes' : '— No') : v;
      bdRows += `<tr><td>${escHtml(k)}</td><td>${display}</td></tr>`;
    }

    card.innerHTML = `
      <div class="result-header">
        <span class="result-name">${escHtml(r.calculator)}</span>
        <span class="score-badge ${rc}">Score: ${r.score}</span>
        <span class="risk-badge ${rc}">${r.risk_level.replace('_', ' ')}</span>
      </div>
      <div class="result-body">
        <p><strong>${escHtml(r.interpretation)}</strong></p>
        <div class="recommendation">💊 ${escHtml(r.recommendation)}</div>
        <details class="breakdown">
          <summary>View parameter breakdown</summary>
          <table class="bd-table"><tbody>${bdRows}</tbody></table>
        </details>
      </div>`;
    el.appendChild(card);
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Allow Ctrl+Enter to submit
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyse();
});
</script>

</body>
</html>
